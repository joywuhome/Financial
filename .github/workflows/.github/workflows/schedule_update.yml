name: 財報自動更新排程

on:
  schedule:
    # 台灣時間 06:00, 15:00, 22:00 自動執行
    - cron: '0 22,7,14 * * *'
  workflow_dispatch: # 保留手動執行按鈕

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 🌟 防卡死保險絲：執行超過 10 分鐘直接強制中斷
    
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3
        
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安裝所需套件
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth urllib3
          
      - name: 執行財報更新程式
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
        run: python update_finance.py
