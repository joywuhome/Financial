name: Manual Payout Update

on:
  workflow_dispatch: # 👈 這是關鍵魔法，代表「不會自動亂跑，只有你點擊按鈕才會執行」

jobs:
  run-payout:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client urllib3 pandas

    - name: Run update_payout.py
      env:
        GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }} # 呼叫您之前設定好的金鑰
      run: python update_payout.py
